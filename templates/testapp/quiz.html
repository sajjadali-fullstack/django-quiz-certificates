<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz Question</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Java Online questions</h5>
          <hr />
          <div class="alert alert-success text-center" id="timer">
            Time Remaining: <span id="time">05:00</span>
          </div>
          <form method="post">
            {% csrf_token %} {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">Submit</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const quizKey = "quiz_timer"; // unique key to avoid collision

      // Total quiz time in seconds (e.g., 5 minutes)
      const totalQuizTime = 1 * 60;

      // Check if timer start time is already saved
      if (!localStorage.getItem(quizKey)) {
        const deadline = Date.now() + totalQuizTime * 1000;
        localStorage.setItem(quizKey, deadline);
      }

      const deadline = parseInt(localStorage.getItem(quizKey));

      function updateTimer() {
        const now = Date.now();
        const diff = Math.max(0, Math.floor((deadline - now) / 1000));

        const minutes = Math.floor(diff / 60);
        const seconds = diff % 60;

        document.getElementById("time").textContent = `${minutes
          .toString()
          .padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        if (diff <= 0) {
          clearInterval(timerInterval);
          localStorage.removeItem(quizKey); // clear the timer
          alert("Time's up! Submitting your quiz...");
          document.querySelector("form").submit(); // auto-submit
        }
      }

      const timerInterval = setInterval(updateTimer, 1000);
      updateTimer();

      // Optional: clear timer manually if quiz is submitted early
      document.querySelector("form").addEventListener("submit", function () {
        localStorage.removeItem(quizKey);
      });
    </script>
  </body>
</html>
