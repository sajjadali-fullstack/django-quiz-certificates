<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Choose Your Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title text-primary mb-4">Choose Your Quiz</h2>

          <form method="post">
            {% csrf_token %} {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">
              Start Quiz
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
